<svg class="anime-svg-asset anime-svg-stagger-dashboard" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="stagger-dashboard-title stagger-dashboard-desc">
  <title id="stagger-dashboard-title">Stagger dashboard asset</title>
  <desc id="stagger-dashboard-desc">A dashboard SVG with repeated cards, bars, and dots designed for Anime.js stagger sequences.</desc>
  <rect class="svg-backdrop" width="960" height="540" rx="42" fill="#f7f7f7"/>
  <g class="dashboard-shell">
    <rect x="92" y="72" width="776" height="396" rx="28" fill="#ffffff" stroke="#cfcfcf" stroke-width="4"/>
    <rect x="92" y="72" width="776" height="72" rx="28" fill="#eff6ff"/>
    <circle class="dashboard-dot" cx="134" cy="108" r="12" fill="#9e1b32"/>
    <circle class="dashboard-dot" cx="174" cy="108" r="12" fill="#e77204"/>
    <circle class="dashboard-dot" cx="214" cy="108" r="12" fill="#45842a"/>
  </g>
  <g class="dashboard-cards" data-anime-group="cards">
    <rect class="dashboard-card" x="134" y="184" width="180" height="218" rx="18" fill="#cdf3ff" stroke="#00ace6" stroke-width="4"/>
    <rect class="dashboard-card" x="390" y="184" width="180" height="218" rx="18" fill="#dbffcc" stroke="#36b300" stroke-width="4"/>
    <rect class="dashboard-card" x="646" y="184" width="180" height="218" rx="18" fill="#fff4cc" stroke="#fcd34d" stroke-width="4"/>
  </g>
  <g class="dashboard-bars" data-anime-group="bars" stroke-linecap="round">
    <path class="dashboard-bar bar-blue" d="M168 246 H278" stroke="#007298" stroke-width="18"/>
    <path class="dashboard-bar bar-blue" d="M168 292 H250" stroke="#007298" stroke-width="18"/>
    <path class="dashboard-bar bar-blue" d="M168 338 H292" stroke="#007298" stroke-width="18"/>
    <path class="dashboard-bar bar-green" d="M424 246 H548" stroke="#45842a" stroke-width="18"/>
    <path class="dashboard-bar bar-green" d="M424 292 H512" stroke="#45842a" stroke-width="18"/>
    <path class="dashboard-bar bar-green" d="M424 338 H532" stroke="#45842a" stroke-width="18"/>
    <path class="dashboard-bar bar-amber" d="M680 246 H792" stroke="#e77204" stroke-width="18"/>
    <path class="dashboard-bar bar-amber" d="M680 292 H760" stroke="#e77204" stroke-width="18"/>
    <path class="dashboard-bar bar-amber" d="M680 338 H806" stroke="#e77204" stroke-width="18"/>
  </g>
  <g class="dashboard-labels" fill="#4f4f4f" font-family="Open Sans, Arial, sans-serif" font-size="24" font-weight="750">
    <text x="134" y="444">stagger cards</text>
    <text x="390" y="444">scale bars</text>
    <text x="646" y="444">pulse dots</text>
  </g>
</svg>
