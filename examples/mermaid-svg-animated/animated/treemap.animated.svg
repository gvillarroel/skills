stroke:#007298;filter:none;}#my-svg [data-look="neo"].node circle{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node circle .state-start{fill:#000000;}#my-svg [data-look="neo"].icon-shape .icon{fill:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}#my-svg .source&gt;*{fill:rgb(205, 243, 255)!important;color:rgb(51, 62, 72)!important;stroke:rgb(0, 114, 152)!important;}#my-svg .source span{fill:rgb(205, 243, 255)!important;color:rgb(51, 62, 72)!important;stroke:rgb(0, 114, 152)!important;}#my-svg .docs&gt;*{fill:rgb(219, 255, 204)!important;color:rgb(51, 62, 72)!important;stroke:rgb(69, 132, 42)!important;}#my-svg .docs span{fill:rgb(219, 255, 204)!important;color:rgb(51, 62, 72)!important;stroke:rgb(69, 132, 42)!important;}#my-svg .theme&gt;*{fill:rgb(255, 244, 204)!important;color:rgb(51, 62, 72)!important;stroke:rgb(231, 114, 4)!important;}#my-svg .theme span{fill:rgb(255, 244, 204)!important;color:rgb(51, 62, 72)!important;stroke:rgb(231, 114, 4)!important;}#my-svg .shape&gt;*{fill:rgb(249, 204, 255)!important;color:rgb(51, 62, 72)!important;stroke:rgb(158, 27, 50)!important;}#my-svg .shape span{fill:rgb(249, 204, 255)!important;color:rgb(51, 62, 72)!important;stroke:rgb(158, 27, 50)!important;}#my-svg .check&gt;*{fill:rgb(249, 204, 255)!important;color:rgb(51, 62, 72)!important;stroke:rgb(101, 47, 108)!important;}#my-svg .check span{fill:rgb(249, 204, 255)!important;color:rgb(51, 62, 72)!important;stroke:rgb(101, 47, 108)!important;}</style><style id="animated-mermaid-style" type="text/css">
.am-step {
  animation-delay: var(--am-delay, 0ms);
  animation-duration: var(--am-duration, 650ms);
  animation-fill-mode: backwards;
  animation-timing-function: var(--am-easing, cubic-bezier(.2, .8, .2, 1));
  transform-box: fill-box;
  transform-origin: center;
}
.am-effect-fade { animation-name: am-fade; }
.am-effect-pop { animation-name: am-pop; }
.am-effect-slide-up { animation-name: am-slide-up; }
.am-effect-slide-left { animation-name: am-slide-left; }
.am-effect-zoom { animation-name: am-zoom; }
.am-effect-draw { animation-name: am-draw; }
.am-effect-grow-arrow {
  animation-name: am-grow-arrow;
  animation-timing-function: cubic-bezier(.16, .84, .28, 1);
  stroke-linecap: round;
  stroke-linejoin: round;
}
@keyframes am-fade {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes am-pop {
  0% { opacity: 0; transform: scale(.92); }
  70% { opacity: 1; transform: scale(1.025); }
  100% { opacity: 1; transform: none; }
}
@keyframes am-slide-up {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: none; }
}
@keyframes am-slide-left {
  from { opacity: 0; transform: translateX(18px); }
  to { opacity: 1; transform: none; }
}
@keyframes am-zoom {
  from { opacity: 0; transform: scale(.86); }
  to { opacity: 1; transform: none; }
}
@keyframes am-draw {
  from {
    opacity: 0;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-draw-distance, 10000);
  }
  12% { opacity: 1; }
  to {
    opacity: 1;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: 0;
  }
}
@keyframes am-grow-arrow {
  0% {
    opacity: 0;
    marker-start: none;
    marker-mid: none;
    marker-end: none;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-draw-distance, 10000);
  }
  8% { opacity: 1; }
  34% {
    marker-start: none;
    marker-mid: none;
    marker-end: none;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-grow-distance-a, 6600);
  }
  62% {
    marker-start: none;
    marker-mid: none;
    marker-end: none;
    stroke-dashoffset: var(--am-grow-distance-b, 2400);
  }
  84% {
    marker-start: none;
    marker-mid: none;
    marker-end: none;
    stroke-dashoffset: var(--am-grow-distance-c, 360);
  }
  92% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
  }
  100% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: 0;
  }
}
@media (prefers-reduced-motion: reduce) {
  .am-step {
    animation: none !important;
    opacity: initial !important;
    transform: none !important;
    stroke-dasharray: initial !important;
    stroke-dashoffset: initial !important;
  }
}
