<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" id="my-svg" width="100%" viewBox="0 0 800 450" style="max-width: 800px; background-color: white;" role="graphics-document document" aria-roledescription="venn" data-animated-mermaid="true" data-animation="organic" data-element-count="7"><style>#my-svg{font-size:16px;fill:#333E48;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#my-svg .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#my-svg .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#my-svg .error-icon{fill:#f9ccff;}#my-svg .error-text{fill:#063300;stroke:#063300;}#my-svg .edge-thickness-normal{stroke-width:1px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-thickness-invisible{stroke-width:0;fill:none;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#45842a;stroke:#45842a;}#my-svg .marker.cross{stroke:#45842a;}#my-svg svg{font-size:16px;}#my-svg p{margin:0;}#my-svg .venn-title{font-size:32px;fill:#063300;}#my-svg .venn-circle text{font-size:48px;}#my-svg .venn-intersection text{font-size:48px;fill:#333E48;}#my-svg .venn-text-node{color:#333E48;}#my-svg .node .neo-node{stroke:#007298;}#my-svg [data-look="neo"].node rect,#my-svg [data-look="neo"].cluster rect,#my-svg [data-look="neo"].node polygon{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node path{stroke:url(#my-svg-gradient);stroke-width:1px;}#my-svg [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node .neo-line path{stroke:#007298;filter:none;}#my-svg [data-look="neo"].node circle{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node circle .state-start{fill:#000000;}#my-svg [data-look="neo"].icon-shape .icon{fill:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><style id="animated-mermaid-style" type="text/css">
.am-step {
  animation-delay: var(--am-delay, 0ms);
  animation-duration: var(--am-duration, 650ms);
  animation-fill-mode: backwards;
  animation-timing-function: var(--am-easing, cubic-bezier(.2, .8, .2, 1));
  transform-box: fill-box;
  transform-origin: center;
}
.am-effect-fade { animation-name: am-fade; }
.am-effect-pop { animation-name: am-pop; }
.am-effect-slide-up { animation-name: am-slide-up; }
.am-effect-slide-left { animation-name: am-slide-left; }
.am-effect-zoom { animation-name: am-zoom; }
.am-effect-draw { animation-name: am-draw; }
.am-effect-radial-arrow,
.am-effect-grow-arrow {
  animation-name: am-grow-arrow;
  animation-timing-function: cubic-bezier(.16, .84, .28, 1);
  stroke-linecap: round;
  stroke-linejoin: round;
}
.am-effect-radial-arrow { animation-name: am-radial-arrow; }
@keyframes am-fade {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes am-pop {
  0% { opacity: 0; transform: scale(.92); }
  70% { opacity: 1; transform: scale(1.025); }
  100% { opacity: 1; transform: none; }
}
@keyframes am-slide-up {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: none; }
}
@keyframes am-slide-left {
  from { opacity: 0; transform: translateX(18px); }
  to { opacity: 1; transform: none; }
}
@keyframes am-zoom {
  from { opacity: 0; transform: scale(.86); }
  to { opacity: 1; transform: none; }
}
@keyframes am-draw {
  from {
    opacity: 0;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-draw-distance, 10000);
  }
  12% { opacity: 1; }
  to {
    opacity: 1;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: 0;
  }
}
@keyframes am-grow-arrow {
  0% {
    opacity: 0;
    marker-start: none;
    marker-mid: none;
    marker-end: none;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-draw-distance, 10000);
  }
  8% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
  }
  34% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-grow-distance-a, 6600);
  }
  62% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: var(--am-grow-distance-b, 2400);
  }
  84% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: var(--am-grow-distance-c, 360);
  }
  100% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: 0;
  }
}
@keyframes am-radial-arrow {
  0% {
    opacity: 0;
    marker-start: none;
    marker-mid: none;
    marker-end: none;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
  }
  10% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
  }
  38% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: 1;
    stroke-dashoffset: .66;
  }
  66% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: .24;
  }
  86% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: .05;
  }
  100% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: 1;
    stroke-dashoffset: 0;
  }
}
@media (prefers-reduced-motion: reduce) {
  .am-step {
    animation: none !important;
    opacity: initial !important;
    transform: none !important;
    stroke-dasharray: initial !important;
    stroke-dashoffset: initial !important;
  }
}
</style><g /><text class="venn-title" font-size="16px" text-anchor="middle" dominant-baseline="middle" x="50%" y="16" style="fill: rgb(6, 51, 0);">"Coverage"</text><g transform="translate(0, 24)"><g class="venn-area venn-circle venn-set-0 am-step am-role-node am-effect-fade" data-venn-sets="Source" style="--am-delay: 0.000ms; --am-duration: 650.000ms; --am-easing: cubic-bezier(.2, .8, .2, 1); --am-draw-distance: 10000.0;" data-am-stage="0"><path d="M 369.9921742526168 245.72891662007623 &#10;m -165.27108337992374 0 &#10;a 165.27108337992374 165.27108337992374 0 1 0 330.5421667598475 0 &#10;a 165.27108337992374 165.27108337992374 0 1 0 -330.5421667598475 0" style="fill-opacity: 0.7; fill: rgb(205, 243, 255); stroke: rgb(0, 114, 152); stroke-width: 2.5; stroke-opacity: 0.95;" /><text class="label" text-anchor="middle" dy=".35em" x="234" y="246" style="fill: rgb(51, 62, 72); font-size: 24px;"><tspan x="234" y="246" dy="0.35em">MMD</tspan></text></g><g class="venn-area venn-circle venn-set-1 am-step am-role-node am-effect-fade" data-venn-sets="Markdown" style="--am-delay: 770.000ms; --am-duration: 650.000ms; --am-easing: cubic-bezier(.2, .8, .2, 1); --am-draw-distance: 10000.0;" data-am-stage="1"><path d="M 430.0078257473832 245.72891662007623 &#10;m -165.27108337992374 0 &#10;a 165.27108337992374 165.27108337992374 0 1 0 330.5421667598475 0 &#10;a 165.27108337992374 165.27108337992374 0 1 0 -330.5421667598475 0" style="fill-opacity: 0.7; fill: rgb(219, 255, 204); stroke: rgb(69, 132, 42); stroke-width: 2.5; stroke-opacity: 0.95;" /><text class="label" text-anchor="middle" dy=".35em" x="565" y="246" style="fill: rgb(51, 62, 72); font-size: 24px;"><tspan x="565" y="246" dy="0.35em">MD</tspan></text></g><g class="venn-area venn-circle venn-set-2 am-step am-role-node am-effect-fade" data-venn-sets="Styled" style="--am-delay: 1540.000ms; --am-duration: 650.000ms; --am-easing: cubic-bezier(.2, .8, .2, 1); --am-draw-distance: 10000.0;" data-am-stage="2"><path d="M 400.0007450