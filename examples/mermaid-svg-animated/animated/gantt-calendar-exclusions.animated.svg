:#333E48!important;}#my-svg .doneCritText0.taskTextOutsideLeft,#my-svg .doneCritText0.taskTextOutsideRight,#my-svg .doneCritText1.taskTextOutsideLeft,#my-svg .doneCritText1.taskTextOutsideRight,#my-svg .doneCritText2.taskTextOutsideLeft,#my-svg .doneCritText2.taskTextOutsideRight,#my-svg .doneCritText3.taskTextOutsideLeft,#my-svg .doneCritText3.taskTextOutsideRight{fill:#333E48!important;}#my-svg .vert{stroke:navy;}#my-svg .vertText{font-size:15px;text-anchor:middle;fill:navy!important;}#my-svg .activeCritText0,#my-svg .activeCritText1,#my-svg .activeCritText2,#my-svg .activeCritText3{fill:#333E48!important;}#my-svg .titleText{text-anchor:middle;font-size:18px;fill:#063300;}#my-svg .node .neo-node{stroke:#007298;}#my-svg [data-look="neo"].node rect,#my-svg [data-look="neo"].cluster rect,#my-svg [data-look="neo"].node polygon{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node path{stroke:url(#my-svg-gradient);stroke-width:1px;}#my-svg [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node .neo-line path{stroke:#007298;filter:none;}#my-svg [data-look="neo"].node circle{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node circle .state-start{fill:#000000;}#my-svg [data-look="neo"].icon-shape .icon{fill:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><style id="animated-mermaid-style" type="text/css">
.am-step {
  animation-delay: var(--am-delay, 0ms);
  animation-duration: var(--am-duration, 650ms);
  animation-fill-mode: backwards;
  animation-timing-function: var(--am-easing, cubic-bezier(.2, .8, .2, 1));
  transform-box: fill-box;
  transform-origin: center;
}
.am-effect-fade { animation-name: am-fade; }
.am-effect-pop { animation-name: am-pop; }
.am-effect-slide-up { animation-name: am-slide-up; }
.am-effect-slide-left { animation-name: am-slide-left; }
.am-effect-zoom { animation-name: am-zoom; }
.am-effect-draw { animation-name: am-draw; }
.am-effect-radial-arrow,
.am-effect-grow-arrow {
  animation-name: am-grow-arrow;
  animation-timing-function: cubic-bezier(.16, .84, .28, 1);
  stroke-linecap: round;
  stroke-linejoin: round;
}
.am-effect-radial-arrow { animation-name: am-radial-arrow; }
@keyframes am-fade {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes am-pop {
  0% { opacity: 0; transform: scale(.92); }
  70% { opacity: 1; transform: scale(1.025); }
  100% { opacity: 1; transform: none; }
}
@keyframes am-slide-up {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: none; }
}
@keyframes am-slide-left {
  from { opacity: 0; transform: translateX(18px); }
  to { opacity: 1; transform: none; }
}
@keyframes am-zoom {
  from { opacity: 0; transform: scale(.86); }
  to { opacity: 1; transform: none; }
}
@keyframes am-draw {
  from {
    opacity: 0;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-draw-distance, 10000);
  }
  12% { opacity: 1; }
  to {
    opacity: 1;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: 0;
  }
}
@keyframes am-grow-arrow {
  0% {
    opacity: 0;
    marker-start: none;
    marker-mid: none;
    marker-end: none;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-draw-distance, 10000);
  }
  8% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
  }
  34% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-grow-distance-a, 6600);
  }
  62% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: var(--am-grow-distance-b, 2400);
  }
  84% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: var(--am-grow-distance-c, 360);
  }
  100% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: 0;
  }
}
@keyframes am-radial-arrow {
  0% {
    opacity: 0;
    marker-start: none;
    marker-mid: none;
    marker-end: none;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
  }
  10% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
  }
  38% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: 1;
    stroke-dashoffset: .66;
  }
  66% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: .24;
  }
  86% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: .05;
  }
  100% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: 1;
    stroke-dashoffset: 0;
  }
}
@media (prefers-reduced-motion: reduce) {
  .am-step {
    animation: none !important;
    opacity: initial !important;
    transform: none !important;
    stroke-dasharray: initial !important;
    stroke-dashoffset: initial !important;
  }
}
