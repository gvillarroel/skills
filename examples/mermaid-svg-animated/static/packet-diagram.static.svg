<svg id="my-svg" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1026 235" style="max-width: 1026px; background-color: white;" role="graphics-document document" aria-roledescription="packet"><style>#my-svg{font-size:16px;fill:#333E48;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#my-svg .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#my-svg .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#my-svg .error-icon{fill:#ffccd5;}#my-svg .error-text{fill:#00332a;stroke:#00332a;}#my-svg .edge-thickness-normal{stroke-width:1px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-thickness-invisible{stroke-width:0;fill:none;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#45842a;stroke:#45842a;}#my-svg .marker.cross{stroke:#45842a;}#my-svg svg{font-size:16px;}#my-svg p{margin:0;}#my-svg .packetByte{font-size:10px;}#my-svg .packetByte.start{fill:black;}#my-svg .packetByte.end{fill:black;}#my-svg .packetLabel{fill:black;font-size:12px;}#my-svg .packetTitle{fill:black;font-size:14px;}#my-svg .packetBlock{stroke:black;stroke-width:1;fill:#efefef;}#my-svg .node .neo-node{stroke:#007298;}#my-svg [data-look="neo"].node rect,#my-svg [data-look="neo"].cluster rect,#my-svg [data-look="neo"].node polygon{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node path{stroke:url(#my-svg-gradient);stroke-width:1px;}#my-svg [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node .neo-line path{stroke:#007298;filter:none;}#my-svg [data-look="neo"].node circle{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node circle .state-start{fill:#000000;}#my-svg [data-look="neo"].icon-shape .icon{fill:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g><rect x="1" y="15" width="123" height="32" class="packetBlock"/><text x="62.5" y="31" class="packetLabel" dominant-baseline="middle" text-anchor="middle">Type</text><text x="1" y="13" class="packetByte start" dominant-baseline="auto" text-anchor="start">0</text><text x="124" y="13" class="packetByte end" dominant-baseline="auto" text-anchor="end">3</text><rect x="129" y="15" width="123" height="32" class="packetBlock"/><text x="190.5" y="31" class="packetLabel" dominant-baseline="middle" text-anchor="middle">Version</text><text x="129" y="13" class="packetByte start" dominant-baseline="auto" text-anchor="start">4</text><text x="252" y="13" class="packetByte end" dominant-baseline="auto" text-anchor="end">7</text><rect x="257" y="15" width="251" height="32" class="packetBlock"/><text x="382.5" y="31" class="packetLabel" dominant-baseline="middle" text-anchor="middle">Palette id</text><text x="257" y="13" class="packetByte start" dominant-baseline="auto" text-anchor="start">8</text><text x="508" y="13" class="packetByte end" dominant-baseline="auto" text-anchor="end">15</text><rect x="513" y="15" width="251" height="32" class="packetBlock"/><text x="638.5" y="31" class="packetLabel" dominant-baseline="middle" text-anchor="middle">Shape id</text><text x="513" y="13" class="packetByte start" dominant-baseline="auto" text-anchor="start">16</text><text x="764" y="13" class="packetByte end" dominant-baseline="auto" text-anchor="end">23</text><rect x="769" y="15" width="251" height="32" class="packetBlock"/><text x="894.5" y="31" class="packetLabel" dominant-baseline="middle" text-anchor="middle">Flags</text><text x="769" y="13" class="packetByte start" dominant-baseline="auto" text-anchor="start">24</text><text x="1020" y="13" class="packetByte end" dominant-baseline="auto" text-anchor="end">31</text></g><g><rect x="1" y="62" width="1019" height="32" class="packetBlock"/><text x="510.5" y="78" class="packetLabel" dominant-baseline="middle" text-anchor="middle">Diagram source length</text><text x="1" y="60" class="packetByte start" dominant-baseline="auto" text-anchor="start">32</text><text x="1020" y="60" class="packetByte end" dominant-baseline="auto" text-anchor="end">63</text></g><g><rect x="1" y="109" width="1019" height="32" class="packetBlock"/><text x="510.5" y="125" class="packetLabel" dominant-baseline="middle" text-anchor="middle">Content hash</text><text x="1" y="107" class="packetByte start" dominant-baseline="auto" text-anchor="start">64</text><text x="1020" y="107" class="packetByte end" dominant-baseline="auto" text-anchor="end">95</text></g><g><rect x="1" y="156" width="1019" height="32" class="packetBlock"/><text x="510.5" y="172" class="packetLabel" dominant-baseline="middle" text-anchor="middle">Content hash</text><text x="1" y="154" class="packetByte start" dominant-baseline="auto" text-anchor="start">96</text><text x="1020" y="154" class="packetByte end" dominant-baseline="auto" text-anchor="end">127</text></g><text x="513" y="211.5" dominant-baseline="middle" text-anchor="middle" class="packetTitle">Example metadata packet</text></svg>