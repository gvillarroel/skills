<svg id="my-svg" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="max-width: 560px; background-color: white;" viewBox="0 0 560 420" role="graphics-document document" aria-roledescription="quadrantChart"><style>#my-svg{font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#my-svg .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#my-svg .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#my-svg .error-icon{fill:hsl(220.5882352941, 100%, 98.3333333333%);}#my-svg .error-text{fill:rgb(8.5000000002, 5.7500000001, 0);stroke:rgb(8.5000000002, 5.7500000001, 0);}#my-svg .edge-thickness-normal{stroke-width:1px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-thickness-invisible{stroke-width:0;fill:none;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#0b0b0b;stroke:#0b0b0b;}#my-svg .marker.cross{stroke:#0b0b0b;}#my-svg svg{font-size:16px;}#my-svg p{margin:0;}#my-svg .node .neo-node{stroke:hsl(40.5882352941, 60%, 83.3333333333%);}#my-svg [data-look="neo"].node rect,#my-svg [data-look="neo"].cluster rect,#my-svg [data-look="neo"].node polygon{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node path{stroke:url(#my-svg-gradient);stroke-width:1px;}#my-svg [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node .neo-line path{stroke:hsl(40.5882352941, 60%, 83.3333333333%);filter:none;}#my-svg [data-look="neo"].node circle{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node circle .state-start{fill:#000000;}#my-svg [data-look="neo"].icon-shape .icon{fill:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g class="main"><g class="quadrants"><g class="quadrant"><rect x="293" y="45" width="262" height="172" fill="#dbffcc"/><text x="0" y="0" fill="#333" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(424, 50) rotate(0)">Schedule carefully</text></g><g class="quadrant"><rect x="31" y="45" width="262" height="172" fill="#cdf3ff"/><text x="0" y="0" fill="#2e2e2e" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(162, 50) rotate(0)">Reuse first</text></g><g class="quadrant"><rect x="31" y="217" width="262" height="172" fill="#ffccd5"/><text x="0" y="0" fill="#292929" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(162, 222) rotate(0)">Skip</text></g><g class="quadrant"><rect x="293" y="217" width="262" height="172" fill="#fff4cc"/><text x="0" y="0" fill="#242424" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(424, 222) rotate(0)">Keep simple</text></g></g><g class="border"><line x1="30" y1="45" x2="556" y2="45" style="stroke: rgb(238, 222, 187); stroke-width: 2;"/><line x1="555" y1="46" x2="555" y2="388" style="stroke: rgb(238, 222, 187); stroke-width: 2;"/><line x1="30" y1="389" x2="556" y2="389" style="stroke: rgb(238, 222, 187); stroke-width: 2;"/><line x1="31" y1="46" x2="31" y2="388" style="stroke: rgb(238, 222, 187); stroke-width: 2;"/><line x1="293" y1="46" x2="293" y2="388" style="stroke: rgb(238, 222, 187); stroke-width: 1;"/><line x1="32" y1="217" x2="554" y2="217" style="stroke: rgb(238, 222, 187); stroke-width: 1;"/></g><g class="data-points"><g class="data-point"><circle cx="465.91999999999996" cy="237.64000000000004" r="8" fill="#ffccd5" stroke="#652f6c" stroke-width="0px"/><text x="0" y="0" fill="#333E48" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(465.91999999999996, 242.64000000000004) rotate(0)">Wardley</text></g><g class="data-point"><circle cx="177.72" cy="278.91999999999996" r="7" fill="#ffd332" stroke="#652f6c" stroke-width="0px"/><text x="0" y="0" fill="#333E48" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(177.72, 283.91999999999996) rotate(0)">Pie</text></g><g class="data-point"><circle cx="439.72" cy="148.20000000000002" r="9" fill="#36b300" stroke="#652f6c" stroke-width="0px"/><text x="0" y="0" fill="#333E48" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(439.72, 153.20000000000002) rotate(0)">C4</text></g><g class="data-point"><circle cx="209.16000000000003" cy="106.92000000000002" r="10" fill="#00ace6" stroke="#652f6c" stroke-width="0px"/><text x="0" y="0" fill="#333E48" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(209.16000000000003, 111.92000000000002) rotate(0)">Flowchart</text></g></g><g class="labels"><g class="label"><text x="0" y="0" fill="#333" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(162, 399) rotate(0)">Low complexity</text></g><g class="label"><text x="0" y="0" fill="#333" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(424, 399) rotate(0)">High complexity</text></g><g class="label"><text x="0" y="0" fill="#333" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(5, 303) rotate(-90)">Low reuse</text></g><g class="label"><text x="0" y="0" fill="#333" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(5, 131) rotate(-90)">High reuse</text></g></g><g class="title"><text x="0" y="0" fill="#333E