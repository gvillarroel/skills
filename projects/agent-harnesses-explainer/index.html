<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Harnesses de agentes</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --ink: #111827;
        --muted: #5b6472;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #stage {
        display: block;
        width: 100vw;
        height: 100vh;
        background: var(--bg);
      }

      .title {
        font-weight: 780;
        letter-spacing: 0;
        fill: var(--ink);
      }

      .subtitle,
      .label {
        fill: var(--muted);
        letter-spacing: 0;
      }

      .small-label {
        fill: #374151;
        letter-spacing: 0;
        font-weight: 620;
      }

      .panel-label {
        fill: #111827;
        letter-spacing: 0;
        font-weight: 720;
      }

      .code {
        font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <svg id="stage" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="Video explicativo sobre harnesses de agentes para ayudantes de codificación"></svg>
    <script src="./node_modules/d3/dist/d3.min.js"></script>
    <script type="module" src="./src/render.js"></script>
  </body>
</html>
