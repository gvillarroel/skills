<svg xmlns="http://www.w3.org/2000/svg" id="my-svg" width="100%" style="max-width: 620px; background-color: white;" viewBox="0 0 620 440" role="graphics-document document" aria-roledescription="quadrantChart" data-animated-mermaid="true" data-animation="quadrant-points" data-element-count="5"><style>#my-svg{font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#my-svg .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#my-svg .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#my-svg .error-icon{fill:hsl(220.5882352941, 100%, 98.3333333333%);}#my-svg .error-text{fill:rgb(8.5000000002, 5.7500000001, 0);stroke:rgb(8.5000000002, 5.7500000001, 0);}#my-svg .edge-thickness-normal{stroke-width:1px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-thickness-invisible{stroke-width:0;fill:none;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#0b0b0b;stroke:#0b0b0b;}#my-svg .marker.cross{stroke:#0b0b0b;}#my-svg svg{font-size:16px;}#my-svg p{margin:0;}#my-svg .node .neo-node{stroke:hsl(40.5882352941, 60%, 83.3333333333%);}#my-svg [data-look="neo"].node rect,#my-svg [data-look="neo"].cluster rect,#my-svg [data-look="neo"].node polygon{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node path{stroke:url(#my-svg-gradient);stroke-width:1px;}#my-svg [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node .neo-line path{stroke:hsl(40.5882352941, 60%, 83.3333333333%);filter:none;}#my-svg [data-look="neo"].node circle{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node circle .state-start{fill:#000000;}#my-svg [data-look="neo"].icon-shape .icon{fill:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><style id="animated-mermaid-style" type="text/css">
.am-step {
  animation-delay: var(--am-delay, 0ms);
  animation-duration: var(--am-duration, 650ms);
  animation-fill-mode: backwards;
  animation-timing-function: var(--am-easing, cubic-bezier(.2, .8, .2, 1));
  transform-box: fill-box;
  transform-origin: center;
}
.am-effect-fade { animation-name: am-fade; }
.am-effect-pop { animation-name: am-pop; }
.am-effect-slide-up { animation-name: am-slide-up; }
.am-effect-slide-left { animation-name: am-slide-left; }
.am-effect-zoom { animation-name: am-zoom; }
.am-effect-draw { animation-name: am-draw; }
.am-effect-radial-arrow,
.am-effect-grow-arrow {
  animation-name: am-grow-arrow;
  animation-timing-function: cubic-bezier(.16, .84, .28, 1);
  stroke-linecap: round;
  stroke-linejoin: round;
}
.am-effect-radial-arrow { animation-name: am-radial-arrow; }
@keyframes am-fade {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes am-pop {
  0% { opacity: 0; transform: scale(.92); }
  70% { opacity: 1; transform: scale(1.025); }
  100% { opacity: 1; transform: none; }
}
@keyframes am-slide-up {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: none; }
}
@keyframes am-slide-left {
  from { opacity: 0; transform: translateX(18px); }
  to { opacity: 1; transform: none; }
}
@keyframes am-zoom {
  from { opacity: 0; transform: scale(.86); }
  to { opacity: 1; transform: none; }
}
@keyframes am-draw {
  from {
    opacity: 0;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-draw-distance, 10000);
  }
  12% { opacity: 1; }
  to {
    opacity: 1;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: 0;
  }
}
@keyframes am-grow-arrow {
  0% {
    opacity: 0;
    marker-start: none;
    marker-mid: none;
    marker-end: none;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-draw-distance, 10000);
  }
  8% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
  }
  34% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-grow-distance-a, 6600);
  }
  62% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: var(--am-grow-distance-b, 2400);
  }
  84% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: var(--am-grow-distance-c, 360);
  }
  100% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: 0;
  }
}
@keyframes am-radial-arrow {
  0% {
    opacity: 0;
    marker-start: none;
    marker-mid: none;
    marker-end: none;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
  }
  10% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
  }
  38% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: 1;
    stroke-dashoffset: .66;
  }
  66% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: .24;
  }
  86% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: .05;
  }
  100% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: 1;
    stroke-dashoffset: 0;
  }
}
@media (prefers-reduced-motion: reduce) {
  .am-step {
    animation: none !important;
    opacity: initial !important;
    transform: none !important;
    stroke-dasharray: initial !important;
    stroke-dashoffset: initial !important;
  }
}
</style><g /><g class="main"><g class="quadrants"><g class="quadrant"><rect x="323" y="45" width="292" height="182" fill="#dbffcc" /><text x="0" y="0" fill="#333" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(469, 50) rotate(0)">Typed and variable</text></g><g class="quadrant"><rect x="31" y="45" width="292" height="182" fill="#cdf3ff" /><text x="0" y="0" fill="#2e2e2e" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(177, 50) rotate(0)">Typed and stable</text></g><g class="quadrant"><rect x="31" y="227" width="292" height="182" fill="#ffccd5" /><text x="0" y="0" fill="#292929" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(177, 232) rotate(0)">Generic and stable</text></g><g class="quadrant"><rect x="323" y="227" width="292" height="182" fill="#fff4cc" /><text x="0" y="0" fill="#242424" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(469, 232) rotate(0)">Generic and variable</text></g></g><g class="border"><line x1="30" y1="45" x2="616" y2="45" style="stroke: rgb(238, 222, 187); stroke-width: 2;" /><line x1="615" y1="46" x2="615" y2="408" style="stroke: rgb(238, 222, 187); stroke-width: 2;" /><line x1="30" y1="409" x2="616" y2="409" style="stroke: rgb(238, 222, 187); stroke-width: 2;" /><line x1="31" y1="46" x2="31" y2="408" style="stroke: rgb(238, 222, 187); stroke-width: 2;" /><line x1="323" y1="46" x2="323" y2="408" style="stroke: rgb(238, 222, 187); stroke-width: 1;" /><line x1="32" y1="227" x2="614" y2="227" style="stroke: rgb(238, 222, 187); stroke-width: 1;" /></g><g class="data-points"><g class="am-wrapper am-step am-role-node am-effect-pop" style="--am-delay: 120.000ms; --am-duration: 650.000ms; --am-easing: cubic-bezier(.2, .8, .2, 1); --am-draw-distance: 10000.0;" data-am-stage="1" data-am-branch="1"><g class="data-point"><circle cx="182.84" cy="186.96" r="7" fill="#652f6c" stroke="#652f6c" stroke-width="0p