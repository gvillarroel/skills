: 10000.0;" data-am-stage="11"><g class="em-box"><rect x="1046" y="155" rx="3" width="233" height="100" stroke="#679ac3" fill="#bcd6fe" /><foreignObject x="1056" y="165" width="213" height="80"><html:div style="display: table; height: 100%; width: 100%;"><html:span style="display: table-cell; text-align: center; vertical-align: middle;"><html:b>ValidateExamples</html:b></html:span></html:div></foreignObject></g></g><g class="am-wrapper am-step am-role-node am-effect-pop" style="--am-delay: 2550.000ms; --am-duration: 650.000ms; --am-easing: cubic-bezier(.2, .8, .2, 1); --am-draw-distance: 10000.0;" data-am-stage="13" data-am-branch="1"><g class="em-box"><rect x="1209" y="295" rx="3" width="242" height="100" stroke="#c19a0f" fill="#ffb778" /><foreignObject x="1219" y="305" width="222" height="80"><html:div style="display: table; height: 100%; width: 100%;"><html:span style="display: table-cell; text-align: center; vertical-align: middle;"><html:b>ExamplesValidated</html:b></html:span></html:div></foreignObject></g></g><path class="em-relation am-step am-role-edge am-effect-grow-arrow" fill="none" stroke="#45842a" stroke-width="1" marker-end="url(#em-arrowhead-my-svg)" d="M388 115 L468.6666666666667 155" style="--am-delay: 212.500ms; --am-duration: 650.000ms; --am-easing: cubic-bezier(.2, .8, .2, 1); --am-draw-distance: 10000.0; --am-grow-distance-a: 6600.000; --am-grow-distance-b: 2400.000; --am-grow-distance-c: 360.000; --am-marker-end: url(#em-arrowhead-my-svg);" data-am-stage="2" data-am-branch="0" /><path class="em-relation am-step am-role-edge am-effect-grow-arrow" fill="none" stroke="#45842a" stroke-width="1" marker-end="url(#em-arrowhead-my-svg)" d="M550.3333333333334 255 L647 295" style="--am-delay: 637.500ms; --am-duration: 650.000ms; --am-easing: cubic-bezier(.2, .8, .2, 1); --am-draw-distance: 10000.0; --am-grow-distance-a: 6600.000; --am-grow-distance-b: 2400.000; --am-grow-distance-c: 360.000; --am-marker-end: url(#em-arrowhead-my-svg);" data-am-stage="4" data-am-branch="0" /><path class="em-relation am-step am-role-edge am-effect-grow-arrow" fill="none" stroke="#45842a" stroke-width="1" marker-end="url(#em-arrowhead-my-svg)" d="M732 295 L816.3333333333334 255" style="--am-delay: 1062.500ms; --am-duration: 650.000ms; --am-easing: cubic-bezier(.2, .8, .2, 1); --am-draw-distance: 10000.0; --am-grow-distance-a: 6600.000; --am-grow-distance-b: 2400.000; --am-grow-distance-c: 360.000; --am-marker-end: url(#em-arrowhead-my-svg);" data-am-stage="6" data-am-branch="1" /><path class="em-relation am-step am-role-edge am-effect-grow-arrow" fill="none" stroke="#45842a" stroke-width="1" marker-end="url(#em-arrowhead-my-svg)" d="M885.6666666666666 155 L962 115" style="--am-delay: 1487.500ms; --am-duration: 650.000ms; --am-easing: cubic-bezier(.2, .8, .2, 1); --am-draw-distance: 10000.0; --am-grow-distance-a: 6600.000; --am-grow-distance-b: 2400.000; --am-grow-distance-c: 360.000; --am-marker-end: url(#em-arrowhead-my-svg);" data-am-stage="8" data-am-branch="1" /><path class="em-relation am-step am-role-edge am-effect-grow-arrow" fill="none" stroke="#45842a" stroke-width="1" marker-end="url(#em-arrowhead-my-svg)" d="M1039 115 L1123.6666666666667 155" style="--am-delay: 1912.500ms; --am-duration: 650.000ms; --am-easing: cubic-bezier(.2, .8, .2, 1); --am-draw-distance: 10000.0; --am-grow-distance-a: 6600.000; --am-grow-distance-b: 2400.000; --am-grow-distance-c: 360.000; --am-marker-end: url(#em-arrowhead-my-svg);" data-am-stage="10" data-am-branch="1" /><path class="em-relation am-step am-role-edge am-effect-grow-arrow" fill="none" stroke="#45842a" stroke-width="1" marker-end="url(#em-arrowhead-my-svg)" d="M1201.3333333333333 255 L1289.6666666666667 295" style="--am-delay: 2337.500ms; --am-duration: 650.000ms; --am-easing: cubic-bezier(.2, .8, .2, 1); --am-draw-distance: 10000.0; --am-grow-distance-a: 6600.000; --am-grow-distance-b: 2400.000; --am-grow-distance-c: 360.000; --am-marker-end: url(#em-arrowhead-my-svg);" data-am-stage="12" data-am-branch="1" /><defs><marker id="em-arrowhead-my-svg" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#45842a" /></marker></defs><style id="animated-mermaid-style" type="text/css">
.am-step {
  animation-delay: var(--am-delay, 0ms);
  animation-duration: var(--am-duration, 650ms);
  animation-fill-mode: backwards;
  animation-timing-function: var(--am-easing, cubic-bezier(.2, .8, .2, 1));
  transform-box: fill-box;
  transform-origin: center;
}
.am-effect-fade { animation-name: am-fade; }
.am-effect-pop { animation-name: am-pop; }
.am-effect-slide-up { animation-name: am-slide-up; }
.am-effect-slide-left { animation-name: am-slide-left; }
.am-effect-zoom { animation-name: am-zoom; }
.am-effect-draw { animation-name: am-draw; }
.am-effect-radial-arrow,
.am-effect-grow-arrow {
  animation-name: am-grow-arrow;
  animation-timing-function: cubic-bezier(.16, .84, .28, 1);
  stroke-linecap: round;
  stroke-linejoin: round;
}
.am-effect-radial-arrow { animation-name: am-radial-arrow; }
@keyframes am-fade {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes am-pop {
  0% { opacity: 0; transform: scale(.92); }
  70% { opacity: 1; transform: scale(1.025); }
  100% { opacity: 1; transform: none; }
}
@keyframes am-slide-up {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: none; }
}
@keyframes am-slide-left {
  from { opacity: 0; transform: translateX(18px); }
  to { opacity: 1; transform: none; }
}
@keyframes am-zoom {
  from { opacity: 0; transform: scale(.86); }
  to { opacity: 1; transform: none; }
}
@keyframes am-draw {
  from {
    opacity: 0;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-draw-distance, 10000);
  }
  12% { opacity: 1; }
  to {
    opacity: 1;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: 0;
  }
}
@keyframes am-grow-arrow {
  0% {
    opacity: 0;
    marker-start: none;
    marker-mid: none;
    marker-end: none;
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-draw-distance, 10000);
  }
  8% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
  }
  34% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: var(--am-grow-distance-a, 6600);
  }
  62% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: var(--am-grow-distance-b, 2400);
  }
  84% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: var(--am-grow-distance-c, 360);
  }
  100% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: var(--am-draw-distance, 10000);
    stroke-dashoffset: 0;
  }
}
@keyframes am-radial-arrow {
  0% {
    opacity: 0;
    marker-start: none;
    marker-mid: none;
    marker-end: none;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
  }
  10% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
  }
  38% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: 1;
    stroke-dashoffset: .66;
  }
  66% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: .24;
  }
  86% {
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dashoffset: .05;
  }
  100% {
    opacity: 1;
    marker-start: var(--am-marker-start, none);
    marker-mid: var(--am-marker-mid, none);
    marker-end: var(--am-marker-end, none);
    stroke-dasharray: 1;
    stroke-dashoffset: 0;
  }
}
@media (prefers-reduced-motion: reduce) {
  .am-step {
    animation: none !important;
    opacity: initial !important;
    transform: none !important;
    stroke-dasharray: initial !important;
    stroke-dashoffset: initial !important;
  }
}
</style></svg>
