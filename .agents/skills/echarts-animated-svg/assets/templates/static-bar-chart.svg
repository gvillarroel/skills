<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="chart-title chart-desc">
  <title id="chart-title">Static bar chart</title>
  <desc id="chart-desc">Small already-rendered bar chart fixture for ECharts SVG animation smoke tests.</desc>
  <rect width="640" height="420" fill="#ffffff" />
  <text x="48" y="44" font-family="Open Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#333e48">Quarterly Tickets</text>
  <line x1="76" y1="328" x2="560" y2="328" stroke="#9c9c9c" stroke-width="1.5" />
  <line x1="76" y1="88" x2="76" y2="328" stroke="#9c9c9c" stroke-width="1.5" />
  <g font-family="Open Sans, Arial, sans-serif" font-size="13" fill="#4f4f4f">
    <text x="128" y="354" text-anchor="middle">Alpha</text>
    <text x="278" y="354" text-anchor="middle">Beta</text>
    <text x="428" y="354" text-anchor="middle">Gamma</text>
    <text x="66" y="332" text-anchor="end">0</text>
    <text x="66" y="252" text-anchor="end">40</text>
    <text x="66" y="172" text-anchor="end">80</text>
    <text x="66" y="92" text-anchor="end">120</text>
  </g>
  <g fill="none" stroke="#e7e7e7" stroke-width="1">
    <line x1="76" y1="248" x2="560" y2="248" />
    <line x1="76" y1="168" x2="560" y2="168" />
    <line x1="76" y1="88" x2="560" y2="88" />
  </g>
  <g font-family="Open Sans, Arial, sans-serif" font-size="14" fill="#333e48" text-anchor="middle">
    <rect x="96" y="208" width="64" height="120" rx="4" fill="#007298" />
    <text x="128" y="198">60</text>
    <rect x="246" y="128" width="64" height="200" rx="4" fill="#45842a" />
    <text x="278" y="118">100</text>
    <rect x="396" y="168" width="64" height="160" rx="4" fill="#e77204" />
    <text x="428" y="158">80</text>
  </g>
</svg>
