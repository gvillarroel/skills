<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Self-Contained Animated SVG</title>
    <style>
      :root {
        --brand-red: #9e1b32;
        --brand-neutral: #333e48;
        --blue: #007298;
        --blue-highlight: #cdf3ff;
        --green: #45842a;
        --green-highlight: #dbffcc;
        --orange: #e77204;
        --orange-highlight: #ffe5cc;
        --gray-100: #e7e7e7;
        --gray-300: #b5b5b5;
        --gray-700: #4f4f4f;
        --page: #f7f7f7;
        --white: #ffffff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--page);
        color: var(--brand-neutral);
        font-family: "Open Sans", Arial, sans-serif;
      }

      svg {
        width: min(960px, 94vw);
        height: auto;
        background: var(--white);
      }

      text {
        font-family: "Open Sans", Arial, sans-serif;
        fill: var(--brand-neutral);
      }

      .stage {
        animation: stage-in 700ms ease both;
      }

      .stage:nth-of-type(2) {
        animation-delay: 160ms;
      }

      .stage:nth-of-type(3) {
        animation-delay: 320ms;
      }

      .packet {
        animation: packet-flow 4.8s ease-in-out infinite;
      }

      .packet:nth-of-type(2) {
        animation-delay: 450ms;
      }

      .packet:nth-of-type(3) {
        animation-delay: 900ms;
      }

      @keyframes stage-in {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes packet-flow {
        0%,
        12% {
          transform: translateX(0);
          opacity: 0;
        }
        18% {
          opacity: 1;
        }
        48% {
          transform: translateX(250px);
          opacity: 1;
        }
        78% {
          transform: translateX(500px);
          opacity: 1;
        }
        100% {
          transform: translateX(500px);
          opacity: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .stage,
        .packet {
          animation: none;
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <svg viewBox="0 0 900 420" role="img" aria-labelledby="svg-title svg-desc" xmlns="http://www.w3.org/2000/svg">
      <title id="svg-title">Self-contained skill evaluation queue</title>
      <desc id="svg-desc">
        Three deterministic stages show a candidate entering a skill-only run and moving to remediation without external resources.
      </desc>

      <rect x="24" y="24" width="852" height="372" rx="8" fill="#ffffff" stroke="#e7e7e7" />
      <text x="64" y="72" font-size="26" font-weight="700">Skill-only validation flow</text>
      <text x="64" y="104" font-size="14" fill="#4f4f4f">Replace labels, marks, and timing while keeping the artifact offline.</text>

      <g class="stage" transform="translate(72 154)">
        <rect width="190" height="132" rx="8" fill="#cdf3ff" stroke="#007298" stroke-width="2" />
        <text x="24" y="42" font-size="20" font-weight="700">Candidate</text>
        <text x="24" y="76" font-size="13">Backlog item</text>
        <text x="24" y="100" font-size="13">Task prompt</text>
      </g>

      <g class="stage" transform="translate(322 154)">
        <rect width="190" height="132" rx="8" fill="#dbffcc" stroke="#45842a" stroke-width="2" />
        <text x="24" y="42" font-size="20" font-weight="700">Skill-only run</text>
        <text x="24" y="76" font-size="13">Copied skill</text>
        <text x="24" y="100" font-size="13">No repo context</text>
      </g>

      <g class="stage" transform="translate(572 154)">
        <rect width="190" height="132" rx="8" fill="#ffe5cc" stroke="#e77204" stroke-width="2" />
        <text x="24" y="42" font-size="20" font-weight="700">Remediation</text>
        <text x="24" y="76" font-size="13">Simpler scripts</text>
        <text x="24" y="100" font-size="13">Better templates</text>
      </g>

      <path d="M 262 220 L 322 220" stroke="#696969" stroke-width="2" stroke-linecap="round" />
      <path d="M 512 220 L 572 220" stroke="#696969" stroke-width="2" stroke-linecap="round" />
      <path d="M 314 214 L 326 220 L 314 226" fill="none" stroke="#696969" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 564 214 L 576 220 L 564 226" fill="none" stroke="#696969" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

      <g transform="translate(172 328)">
        <circle class="packet" cx="0" cy="0" r="9" fill="#9e1b32" />
        <circle class="packet" cx="0" cy="0" r="9" fill="#007298" />
        <circle class="packet" cx="0" cy="0" r="9" fill="#652f6c" />
      </g>
    </svg>
  </body>
</html>
