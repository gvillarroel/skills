<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Token Orbit 3D Scene</title>
    <style>
      :root {
        --brand: #9e1b32;
        --neutral: #333e48;
        --blue: #007298;
        --green: #45842a;
        --orange: #e77204;
        --yellow: #f1c319;
        --purple: #652f6c;
        --gray-100: #e7e7e7;
        --page: #f7f7f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--page);
        color: var(--neutral);
        font-family: "Open Sans", Arial, sans-serif;
      }

      main {
        width: min(960px, calc(100vw - 32px));
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 10px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
      }

      button {
        border: 1px solid var(--neutral);
        background: #ffffff;
        color: var(--neutral);
        border-radius: 6px;
        padding: 8px 12px;
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        background: var(--gray-100);
      }

      .stage {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        min-height: 320px;
        overflow: hidden;
        border: 1px solid var(--gray-100);
        background: #ffffff;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .status {
        position: absolute;
        left: 12px;
        bottom: 10px;
        padding: 6px 8px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.86);
        color: var(--neutral);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="toolbar">
        <h1>Token Orbit</h1>
        <button id="replay" type="button" aria-label="Replay animation">Replay</button>
      </div>
      <section class="stage" aria-label="Animated token orbit scene">
        <canvas id="scene-canvas"></canvas>
        <div class="status" id="status">Drag to orbit. Replay resets the scene.</div>
      </section>
    </main>

    <script type="module">
      import * as THREE from "./skills/threejs-animated-3d/assets/vendor/three.module.min.js";

      const canvas = document.getElementById("scene-canvas");
      const replay = document.getElementById("replay");
      const status = document.getElementById("status");
      const palette = {
        brand: 0x9e1b32,
        blue: 0x007298,
        green: 0x45842a,
        orange: 0xe77204,
        yellow: 0xf1c319,
        purple: 0x652f6c,
        neutral: 0x333e48,
        gray: 0xe7e7e7,
        white: 0xffffff,
      };

      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        preserveDrawingBuffer: true,
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setClearColor(palette.white, 1);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(42, 16 / 9, 0.1, 100);
      const clock = new THREE.Clock();

      scene.add(new THREE.AmbientLight(0xffffff, 0.62));
      const keyLight = new THREE.DirectionalLight(0xffffff, 1.3);
      keyLight.position.set(5, 8, 7);
      scene.add(keyLight);
      const rimLight = new THREE.PointLight(palette.blue, 1.0, 18);
      rimLight.position.set(-4, 3, -5);
      scene.add(rimLight);

      const floor = new THREE.Mesh(
        new THREE.RingGeometry(2.4, 5.8, 96),
        new THREE.MeshStandardMaterial({
          color: palette.gray,
          roughness: 0.82,
          metalness: 0.02,
          transparent: true,
          opacity: 0.34,
          side: THREE.DoubleSide,
        }),
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -1.45;
      scene.add(floor);

      const hub = new THREE.Mesh(
        new THREE.TorusKnotGeometry(0.86, 0.22, 128, 16),
        new THREE.MeshStandardMaterial({
          color: palette.brand,
          roughness: 0.42,
          metalness: 0.18,
        }),
      );
      scene.add(hub);

      const tokenColors = [palette.blue, palette.green, palette.orange, palette.yellow, palette.purple];
      const tokenGeometry = new THREE.IcosahedronGeometry(0.32, 1);
      const tokens = tokenColors.map((color, index) => {
        const token = new THREE.Mesh(
          tokenGeometry,
          new THREE.MeshStandardMaterial({
            color,
            roughness: 0.35,
            metalness: 0.12,
          }),
        );
        token.userData = {
          radius: 2.0 + index * 0.34,
          speed: 0.55 + index * 0.09,
          phase: index * Math.PI * 0.4,
          lift: -0.35 + index * 0.18,
        };
        scene.add(token);
        return token;
      });

      const spokes = new THREE.Group();
      const spokeMaterial = new THREE.LineBasicMaterial({ color: palette.neutral, transparent: true, opacity: 0.22 });
      for (let i = 0; i < 24; i += 1) {
        const angle = (i / 24) * Math.PI * 2;
        const points = [
          new THREE.Vector3(Math.cos(angle) * 1.1, -1.42, Math.sin(angle) * 1.1),
          new THREE.Vector3(Math.cos(angle) * 5.6, -1.42, Math.sin(angle) * 5.6),
        ];
        spokes.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), spokeMaterial));
      }
      scene.add(spokes);

      let startedAt = performance.now();
      let yaw = 0.72;
      let pitch = 0.34;
      let dragging = false;
      let lastX = 0;
      let lastY = 0;

      function resize() {
        const rect = canvas.parentElement.getBoundingClientRect();
        const width = Math.max(320, Math.floor(rect.width));
        const height = Math.max(240, Math.floor(rect.height));
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      function updateCamera() {
        const radius = 6.8;
        const y = Math.sin(pitch) * radius;
        const planar = Math.cos(pitch) * radius;
        camera.position.set(Math.sin(yaw) * planar, y, Math.cos(yaw) * planar);
        camera.lookAt(0, 0, 0);
      }

      function animate() {
        requestAnimationFrame(animate);
        const seconds = (performance.now() - startedAt) / 1000;
        hub.rotation.x = seconds * 0.45;
        hub.rotation.y = seconds * 0.72;
        tokens.forEach((token, index) => {
          const data = token.userData;
          const angle = seconds * data.speed + data.phase;
          token.position.set(
            Math.cos(angle) * data.radius,
            data.lift + Math.sin(seconds * 1.4 + index) * 0.35,
            Math.sin(angle) * data.radius,
          );
          token.rotation.x = seconds * (0.7 + index * 0.08);
          token.rotation.y = seconds * (0.55 + index * 0.07);
        });
        floor.rotation.z = seconds * 0.08;
        spokes.rotation.y = seconds * 0.05;
        updateCamera();
        renderer.render(scene, camera);
      }

      replay.addEventListener("click", () => {
        startedAt = performance.now();
        clock.start();
        status.textContent = "Replay started.";
      });

      canvas.addEventListener("pointerdown", (event) => {
        dragging = true;
        lastX = event.clientX;
        lastY = event.clientY;
        canvas.setPointerCapture(event.pointerId);
        status.textContent = "Dragging camera.";
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!dragging) return;
        const dx = event.clientX - lastX;
        const dy = event.clientY - lastY;
        lastX = event.clientX;
        lastY = event.clientY;
        yaw += dx * 0.008;
        pitch = Math.max(-0.25, Math.min(0.92, pitch + dy * 0.006));
      });

      canvas.addEventListener("pointerup", (event) => {
        dragging = false;
        canvas.releasePointerCapture(event.pointerId);
        status.textContent = "Drag to orbit. Replay resets the scene.";
      });

      window.addEventListener("resize", resize);
      resize();
      animate();
      window.__threeRuntimeSceneReady = true;
      window.__threeRuntimeScene = {
        replay: () => replay.click(),
        dispose: () => {
          renderer.dispose();
          tokenGeometry.dispose();
          floor.geometry.dispose();
          hub.geometry.dispose();
        },
      };
    </script>
  </body>
</html>
