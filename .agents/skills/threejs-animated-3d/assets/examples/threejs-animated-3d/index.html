<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Three.js Animated 3D Examples</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..700,0..1,0&family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="./src/main.js"></script>
</head>
<body>
  <main class="page-shell" data-expected-examples="24">
    <header class="page-header">
      <div>
        <h1>Three.js Animated 3D Examples</h1>
        <p class="intro">Replayable WebGL scenes using the repository's known red, orange, yellow, green, blue, purple, black, and white visual tokens.</p>
      </div>
      <div class="header-actions">
        <button class="replay-all-button" id="replay-all" type="button" aria-label="Replay every Three.js scene">
          <span class="material-symbols-rounded" aria-hidden="true">replay</span>
          Replay all
        </button>
        <div class="summary" aria-label="Gallery summary">
          <span><strong id="example-count">0</strong> scenes</span>
          <span><strong>WebGL</strong> canvas</span>
          <span><strong>Three.js</strong> generated</span>
        </div>
      </div>
    </header>

    <section class="gallery" id="gallery" aria-label="Three.js scene examples"></section>
  </main>
</body>
</html>
